project_name: m2-clone-basic
domain: m2-clone-basic.test
recipe: magento2
remotes:
  dev:
    host: dev.example.com
    port: 22
    user: deploy
    path: /var/www/html
    capabilities:
      files: true
      media: true
      db: true
      deploy: false
    auth:
      method: keyfile
      key_path: ~/.ssh/id_rsa
  staging:
    host: staging.example.com
    port: 22
    user: deploy
    path: /srv/www/staging
    capabilities:
      files: true
      media: true
      db: true
      deploy: false
    auth:
      method: keyfile
      key_path: ~/.ssh/id_rsa
  production:
    host: prod.example.com
    port: 22
    user: deploy
    path: /var/www/html
    environment: production
    protected: true
    capabilities:
      files: true
      media: true
      db: true
      deploy: true
    auth:
      method: keyfile
      key_path: ~/.ssh/id_rsa
  prod:
    host: prod.example.com
    port: 22
    user: deploy
    path: /srv/www/prod
    environment: production
    protected: true
    capabilities:
      files: true
      media: true
      db: true
      deploy: true
    auth:
      method: keyfile
      key_path: ~/.ssh/id_rsa
