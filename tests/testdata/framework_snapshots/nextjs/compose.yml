networks:
    govard-net:
        driver: bridge
    govard-proxy:
        external: true
services:
    web:
        command: |
            sh -lc 'if [ ! -d node_modules ] || [ -z "$$(ls -A node_modules 2>/dev/null)" ]; then npm install; fi; exec npm run dev -- --hostname 0.0.0.0 --port 80;'
        environment:
            - NODE_ENV=development
            - PORT=80
        image: node:24
        networks:
            - govard-net
            - govard-proxy
        user: root
        volumes:
            - .:/app
        working_dir: /app
