networks:
    govard-net:
        driver: bridge
    govard-proxy:
        external: true
services:
    db:
        environment:
            MYSQL_DATABASE: openmage
            MYSQL_PASSWORD: openmage
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: openmage
        hostname: snapshot-openmage-db
        image: ddtcorex/govard-mariadb:10.11
        networks:
            - govard-net
            - govard-proxy
        volumes:
            - db-data:/var/lib/mysql
    php:
        environment:
            CHOWN_DIR_LIST: /bash_history
            COMPOSER_CACHE_DIR: /home/www-data/.cache/composer
            COMPOSER_HOME: /home/www-data/.composer
            COMPOSER_VERSION: latest
            GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
            NODE_VERSION: "24"
            PGID: 1000
            PUID: 1000
            XDEBUG_MODE: "off"
        extra_hosts:
            - host.docker.internal:host-gateway
            - mail:host-gateway
        hostname: snapshot-openmage-php-fpm
        image: ddtcorex/govard-php-magento1:8.2
        networks:
            - govard-net
        volumes:
            - .:/var/www/html
    web:
        depends_on:
            - php
        environment:
            - NGINX_PUBLIC=
            - NGINX_TEMPLATE=magento1.conf
            - PUID=1000
            - PGID=1000
            - CHOWN_DIR_LIST="/bash_history"
        hostname: snapshot-openmage-web
        image: ddtcorex/govard-nginx:1.28
        networks:
            - govard-net
            - govard-proxy
        volumes:
            - .:/var/www/html
            - <GOVARD_HOME>/nginx/snapshot-openmage/default.conf:/etc/nginx/templates/magento1.conf:ro
            - <GOVARD_HOME>/nginx/snapshot-openmage/mage-run-map.conf:/etc/nginx/conf.d/mage-run-map.conf:ro
volumes:
    db-data: null
