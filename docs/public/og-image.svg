<!-- docs/public/og-image.svg -->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-bg" x1="24" y1="20" x2="232" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f2a1b"/>
      <stop offset="1" stop-color="#09180f"/>
    </linearGradient>
    <linearGradient id="logo-accent" x1="64" y1="58" x2="206" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dff8b"/>
      <stop offset="1" stop-color="#0ddf62"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0c1810"/>
  <rect x="8" y="8" width="1184" height="614" fill="none" stroke="#1a3322" stroke-width="2"/>
  <!-- Large faint watermark of the logo's arc motif, for right-side visual balance -->
  <g transform="translate(1120,315) scale(3.05)" opacity="0.07">
    <path d="M77,-36 A85,85 0 1 0 85,0 H0"
          fill="none" stroke="#2dff8b" stroke-linecap="round" stroke-linejoin="round" stroke-width="24"/>
  </g>
  <!-- Govard logo mark, matching docs/public/favicon.svg exactly -->
  <g transform="translate(100,165) scale(0.390625)">
    <rect x="0" y="0" width="256" height="256" rx="52" fill="url(#logo-bg)"/>
    <rect x="6" y="6" width="244" height="244" rx="46" fill="none" stroke="#2dff8b" stroke-opacity="0.22" stroke-width="4"/>
    <g transform="translate(128, 128)">
      <path d="M77,-36 A85,85 0 1 0 85,0 H0"
            fill="none" stroke="url(#logo-accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="24"/>
    </g>
  </g>
  <text x="240" y="235" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="700" fill="#f0fdf4">Govard</text>
  <text x="150" y="365" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="600" fill="#0df259">DDEV &amp; Warden Alternative</text>
  <text x="150" y="435" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#a3b3ab">Go-based local dev orchestrator for Magento,</text>
  <text x="150" y="477" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#a3b3ab">Laravel, Symfony &amp; WordPress</text>
  <text x="150" y="560" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#4a5a51">govard.ddtcorex.com</text>
</svg>
