map $http_cookie $fastcgi_backend {
    default php_backend;
    ~*XDEBUG_SESSION=${XDEBUG_SESSION_PATTERN} php_debug_backend;
}

upstream php_backend {
    server php:9000;
}

upstream php_debug_backend {
    server php-debug:9000;
}


server {
    listen 80;
    server_name _;
    root /var/www/html${NGINX_PUBLIC};

    index index.php index.html;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass $fastcgi_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS 'on';
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp)$ {
        expires 30d;
        access_log off;
    }

    location ~* (\.htaccess$|\.git) {
        deny all;
    }
}
