services:
  caddy:
    image: caddy:latest
    container_name: govard-proxy-caddy
    restart: always
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --resume
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
      - "9200:9200"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - govard-proxy

  mail:
    image: axllent/mailpit:latest
    container_name: govard-proxy-mail
    restart: always
    environment:
      - MP_MAX_MESSAGES=500
      - MP_SMTP_BIND_ADDR=0.0.0.0:1025
      - MP_HTTP_BIND_ADDR=0.0.0.0:8025
    ports:
      - "1025:1025"
    volumes:
      - mail-data:/data
    networks:
      govard-proxy:
        aliases:
          - mail

  pma:
    image: phpmyadmin/phpmyadmin:5.2.2
    container_name: govard-proxy-pma
    restart: always
    environment:
      - PMA_ARBITRARY=1
    volumes:
      - ./config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
      - ../:/govard-registry:ro
    networks:
      - govard-proxy

  dnsmasq:
    image: ddtcorex/govard-dnsmasq:latest
    container_name: govard-proxy-dnsmasq
    restart: always
    cap_add:
      - NET_ADMIN
    command: -k -A /.test/127.0.0.1
    ports:
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:53:53/tcp"
    networks:
      - govard-proxy

  portainer:
    image: portainer/portainer-ce:latest
    container_name: govard-proxy-portainer
    restart: always
    command: --admin-password '$$2y$$05$$kPildpVdhSHibCqqR8HFWO2XpZl2mWCo4eJ84LCZJrInbIQIiJu5u'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - govard-proxy

networks:
  govard-proxy:
    external: true

volumes:
  caddy-data:
  caddy-config:
  portainer-data:
  mail-data:
