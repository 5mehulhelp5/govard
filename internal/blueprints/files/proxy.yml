services:
  caddy:
    image: caddy:latest
    container_name: govard-proxy-caddy
    restart: "no"
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019" # Caddy Admin API
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - govard-proxy

  mail:
    image: axllent/mailpit:latest
    container_name: govard-proxy-mail
    restart: always
    environment:
      - MP_MAX_MESSAGES=500
      - MP_SMTP_BIND_ADDR=0.0.0.0:1025
      - MP_HTTP_BIND_ADDR=0.0.0.0:8025
    networks:
      - govard-proxy

  pma:
    image: phpmyadmin/phpmyadmin:latest
    container_name: govard-proxy-pma
    restart: always
    environment:
      - PMA_ARBITRARY=1
    volumes:
      - ./config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
      - ../projects.json:/tmp/projects.json:ro
    networks:
      - govard-proxy

  dnsmasq:
    image: ddtcorex/govard-dnsmasq:latest
    container_name: govard-proxy-dnsmasq
    restart: always
    cap_add:
      - NET_ADMIN
    command: -k -A /.test/127.0.0.1
    ports:
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:53:53/tcp"
    networks:
      - govard-proxy

  portainer:
    image: portainer/portainer-ce:latest
    container_name: govard-proxy-portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - govard-proxy

networks:
  govard-proxy:
    external: true

volumes:
  caddy_data:
  caddy_config:
  portainer_data:
