# Base Docker Compose configuration shared across all frameworks
# This file contains common services and network definitions

{{ $web := .Config.Stack.Services.WebServer }}
{{ $isApache := eq $web "apache" }}
{{ $isHybrid := eq $web "hybrid" }}
{{ $isMagento := or (eq .Config.Framework "magento1") (eq .Config.Framework "magento2") (eq .Config.Framework "openmage") }}

services:
  web:
    hostname: {{ .Config.ProjectName }}-web
    image: {{ if $isApache }}{{ $.ImageRepository }}apache:{{ .Config.Stack.ApacheVersion }}{{ else }}{{ $.ImageRepository }}nginx:{{ .Config.Stack.NginxVersion }}{{ end }}
    volumes:
      - .:{{ .WorkDir }}
      {{ if and (not $isApache) .NginxConfigPath }}
      - "{{ .NginxConfigPath }}:/etc/nginx/templates/{{ if $isHybrid }}hybrid.conf{{ else }}{{ .NGINXTemplate }}{{ end }}:ro"
      {{ end }}
      {{ if and $isMagento (not $isApache) (not $isHybrid) .NginxMageRunMapPath }}
      - "{{ .NginxMageRunMapPath }}:/etc/nginx/conf.d/mage-run-map.conf:ro"
      {{ end }}
      {{ if and $isApache .ApacheConfigDir }}
      - "{{ .ApacheConfigDir }}:/usr/local/apache2/conf"
      {{ end }}
    networks:
      - govard-net
      - govard-proxy
    depends_on:
      - php
      {{ if $isHybrid }}
      - apache
      {{ end }}
    environment:
      {{ if $isApache }}
      - APACHE_DOCUMENT_ROOT={{ .WorkDir }}{{ .NGINXPublic }}
      - APACHE_XDEBUG_SESSION={{ .XdebugSessionPattern }}
      {{ else }}
      - NGINX_PUBLIC={{ .NGINXPublic }}
      {{ if $isHybrid }}
      - NGINX_TEMPLATE=hybrid.conf
      {{ else }}
      - NGINX_TEMPLATE={{ .NGINXTemplate }}
      {{ end }}
      {{ end }}
      - PUID={{ .Config.Stack.UserID }}
      - PGID={{ .Config.Stack.GroupID }}
      - CHOWN_DIR_LIST="{{ range $i, $dir := .Config.Stack.ChownDirList }}{{ if $i }} {{ end }}{{ $dir }}{{ end }}"

  {{ if $isHybrid }}
  apache:
    hostname: {{ .Config.ProjectName }}-apache
    image: {{ $.ImageRepository }}apache:{{ .Config.Stack.ApacheVersion }}
    volumes:
      - .:{{ .WorkDir }}
      {{ if .ApacheConfigDir }}
      - "{{ .ApacheConfigDir }}:/usr/local/apache2/conf"
      {{ end }}
    networks:
      - govard-net
    depends_on:
      - php
    environment:
      - APACHE_DOCUMENT_ROOT={{ .WorkDir }}{{ .NGINXPublic }}
      - APACHE_XDEBUG_SESSION={{ .XdebugSessionPattern }}
      - PUID={{ .Config.Stack.UserID }}
      - PGID={{ .Config.Stack.GroupID }}
      - CHOWN_DIR_LIST="{{ range $i, $dir := .Config.Stack.ChownDirList }}{{ if $i }} {{ end }}{{ $dir }}{{ end }}"
  {{ end }}

  php:
    hostname: {{ .Config.ProjectName }}-php-fpm
    image: {{ if eq .Config.Framework "magento2" }}{{ $.ImageRepository }}php-magento2:{{ .Config.Stack.PHPVersion }}{{ else if or (eq .Config.Framework "magento1") (eq .Config.Framework "openmage") }}{{ $.ImageRepository }}php-magento1:{{ .Config.Stack.PHPVersion }}{{ else }}{{ $.ImageRepository }}php:{{ .Config.Stack.PHPVersion }}{{ end }}
    volumes:
      - .:{{ .WorkDir }}
      {{ if (lt .Config.Stack.PHPVersion "7.3") }}
      - /dev/null:/usr/local/etc/php-fpm.d/docker-tuned.conf:ro
      {{ end }}
      {{ if .HostSSHDir }}
      - "{{ .HostSSHDir }}:{{ .HomeWWWData }}/.ssh:ro"
      {{ end }}
      {{ if .SafeSSHConfig }}
      - "{{ .SafeSSHConfig }}:{{ .HomeWWWData }}/.ssh/config:ro"
      {{ end }}
      {{ if .SSHAuthSock }}
      - "{{ .SSHAuthSock }}:/ssh-agent"
      {{ end }}
      {{ if .HostComposerCacheDir }}
      - "{{ .HostComposerCacheDir }}:{{ .HomeWWWData }}/.cache/composer"
      {{ end }}
      {{ if .HostComposerConfigDir }}
      - "{{ .HostComposerConfigDir }}:{{ .HomeWWWData }}/.composer:ro"
      {{ end }}
      {{ if .HostGovardRootCAPath }}
      - "{{ .HostGovardRootCAPath }}:/usr/local/share/ca-certificates/govard.crt:ro"
      {{ end }}
    networks:
      - govard-net
    environment:
      XDEBUG_MODE: off
      {{ if .SSHAuthSock }}
      SSH_AUTH_SOCK: "/ssh-agent"
      {{ end }}
      GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      COMPOSER_CACHE_DIR: "{{ .HomeWWWData }}/.cache/composer"
      COMPOSER_VERSION: "{{ .ComposerVersion }}"
      PUID: {{ .Config.Stack.UserID }}
      PGID: {{ .Config.Stack.GroupID }}
      CHOWN_DIR_LIST: "{{ range $i, $dir := .Config.Stack.ChownDirList }}{{ if $i }} {{ end }}{{ $dir }}{{ end }}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "mail:host-gateway"
      {{ range .RuntimeDomainHosts }}
      - "{{ . }}"
      {{ end }}
    {{ if and (eq .Config.Framework "magento2") .Config.Stack.Features.LiveReload }}
    ports:
      - "35729:35729"
    {{ end }}

  {{ if .Config.Stack.Features.Xdebug }}
  php-debug:
    hostname: {{ .Config.ProjectName }}-php-debug
    image: {{ if eq .Config.Framework "magento2" }}{{ $.ImageRepository }}php-magento2:{{ .Config.Stack.PHPVersion }}-debug{{ else if or (eq .Config.Framework "magento1") (eq .Config.Framework "openmage") }}{{ $.ImageRepository }}php-magento1:{{ .Config.Stack.PHPVersion }}-debug{{ else }}{{ $.ImageRepository }}php:{{ .Config.Stack.PHPVersion }}-debug{{ end }}
    volumes:
      - .:{{ .WorkDir }}
      {{ if (lt .Config.Stack.PHPVersion "7.3") }}
      - /dev/null:/usr/local/etc/php-fpm.d/docker-tuned.conf:ro
      {{ end }}
      {{ if .HostSSHDir }}
      - "{{ .HostSSHDir }}:{{ .HomeWWWData }}/.ssh:ro"
      {{ end }}
      {{ if .SafeSSHConfig }}
      - "{{ .SafeSSHConfig }}:{{ .HomeWWWData }}/.ssh/config:ro"
      {{ end }}
      {{ if .SSHAuthSock }}
      - "{{ .SSHAuthSock }}:/ssh-agent"
      {{ end }}
      {{ if .HostComposerCacheDir }}
      - "{{ .HostComposerCacheDir }}:{{ .HomeWWWData }}/.cache/composer"
      {{ end }}
      {{ if .HostComposerConfigDir }}
      - "{{ .HostComposerConfigDir }}:{{ .HomeWWWData }}/.composer:ro"
      {{ end }}
      {{ if .HostGovardRootCAPath }}
      - "{{ .HostGovardRootCAPath }}:/usr/local/share/ca-certificates/govard.crt:ro"
      {{ end }}
    networks:
      - govard-net
    environment:
      {{ if (ge .Config.Stack.PHPVersion "7.2") }}
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: "client_host=host.docker.internal start_with_request=yes"
      {{ else }}
      XDEBUG_CONFIG: "remote_enable=1 remote_host=host.docker.internal remote_port=9003"
      {{ end }}
      PHP_IDE_CONFIG: "serverName={{ .Config.ProjectName }}-docker"
      {{ if .SSHAuthSock }}
      SSH_AUTH_SOCK: "/ssh-agent"
      {{ end }}
      GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      COMPOSER_CACHE_DIR: "{{ .HomeWWWData }}/.cache/composer"
      COMPOSER_VERSION: "{{ .ComposerVersion }}"
      PUID: {{ .Config.Stack.UserID }}
      PGID: {{ .Config.Stack.GroupID }}
      CHOWN_DIR_LIST: "{{ range $i, $dir := .Config.Stack.ChownDirList }}{{ if $i }} {{ end }}{{ $dir }}{{ end }}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "mail:host-gateway"
      {{ range .RuntimeDomainHosts }}
      - "{{ . }}"
      {{ end }}
  {{ end }}

  {{ if ne .Config.Stack.DBType "none" }}
  db:
    hostname: {{ .Config.ProjectName }}-db
    image: {{ $.ImageRepository }}{{ .Config.Stack.DBType }}:{{ .Config.Stack.DBVersion }}
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: {{ .DatabaseName }}
      MYSQL_USER: {{ .DatabaseName }}
      MYSQL_PASSWORD: {{ .DatabaseName }}
    networks:
      - govard-net
      - govard-proxy
    volumes:
      - db-data{{ if .Config.Profile }}-{{ .Config.Profile }}{{ end }}:/var/lib/mysql
  {{ end }}

networks:
  govard-net:
    driver: bridge
    {{ if .Config.Stack.Features.Isolated }}
    internal: true
    {{ end }}
  govard-proxy:
    external: true

{{ if and .Config.Stack.DBType (ne .Config.Stack.DBType "none") }}
volumes:
  db-data{{ if .Config.Profile }}-{{ .Config.Profile }}{{ end }}:
{{ end }}
