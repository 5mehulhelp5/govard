# Next.js Docker Compose configuration
# This is the main Docker Compose file for Next.js projects

{{ $cache := .Config.Stack.Services.Cache }}
{{ $cacheVersion := .Config.Stack.CacheVersion }}
{{ $queue := .Config.Stack.Services.Queue }}
{{ $queueVersion := .Config.Stack.QueueVersion }}

services:
  web:
    image: node:{{ .Config.Stack.NodeVersion }}-alpine
    working_dir: /app
    user: root
    volumes:
      - .:/app
    command: npm run dev -- --hostname 0.0.0.0 --port 80
    environment:
      - NODE_ENV=development
      - PORT=80
    networks:
      - govard-net
      - govard-proxy

networks:
  govard-net:
    driver: bridge
  govard-proxy:
    external: true
