map $http_cookie $fastcgi_backend {
    default php_backend;
    ~*XDEBUG_SESSION=${XDEBUG_SESSION_PATTERN} php_debug_backend;
}

upstream php_backend {
    server php:9000;
}

upstream php_debug_backend {
    server php-debug:9000;
}

include /etc/nginx/conf.d/mage-run-map.conf;

server {
    listen 80;
    server_name _;
    set $MAGE_ROOT /var/www/html;
    root $MAGE_ROOT${NGINX_PUBLIC};

    index index.php;
    autoindex off;
    charset UTF-8;
    error_page 404 403 = /errors/404.php;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ${NGINX_PUBLIC}/ {
        location ~ ^${NGINX_PUBLIC}/media/(auth|customer|downloadable|import|theme_customization/.*\.xml) {
            deny all;
        }
        alias $MAGE_ROOT${NGINX_PUBLIC}/;
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /static/ {
        location ~ ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }

        location ~* \.(ico|jpg|jpeg|png|gif|svg|svgz|webp|avif|avifs|js|css|eot|ttf|otf|woff|woff2|html|json|webmanifest)$ {
            add_header Cache-Control "public";
            add_header X-Frame-Options "SAMEORIGIN";
            expires +1y;

            if (!-f $request_filename) {
                rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last;
            }
        }
        location ~* \.(zip|gz|gzip|bz2|csv|xml)$ {
            add_header Cache-Control "no-store";
            add_header X-Frame-Options "SAMEORIGIN";
            expires    off;

            if (!-f $request_filename) {
               rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last;
            }
        }
        if (!-f $request_filename) {
            rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last;
        }
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /media/ {
        try_files $uri $uri/ /get.php$is_args$args;

        location ~ ^/media/theme_customization/.*\.xml {
            deny all;
        }

        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN";
        expires +1y;
    }

    location /media/customer/ {
        deny all;
    }

    location /media/downloadable/ {
        deny all;
    }

    location /media/import/ {
        deny all;
    }

    # Grunt livereload proxy
    location = /livereload.js {
        proxy_pass http://php:35729/livereload.js;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location ~ (index|get|static|report|404|503|health_check)\.php$ {
        try_files $uri =404;
        fastcgi_pass   $fastcgi_backend;
        fastcgi_buffers 1024 4k;
        fastcgi_buffer_size 128k;

        fastcgi_param  PHP_FLAG  "session.auto_start=off \n allow_url_fopen=on";
        fastcgi_param  PHP_VALUE "memory_limit=768M \n max_execution_time=18000";
        fastcgi_read_timeout 600s;
        fastcgi_connect_timeout 600s;

        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_param  HTTPS 'on';
        fastcgi_param  MAGE_RUN_CODE $mage_run_code;
        fastcgi_param  MAGE_RUN_TYPE $mage_run_type;
    }

    gzip on;
    gzip_disable "msie6";

    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/js
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_vary on;

    location ~* (\.php$|\.phtml$|\.htaccess$|\.git) {
        deny all;
    }
}
