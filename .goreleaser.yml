version: 2

project_name: govard

builds:
  - id: govard
    main: ./cmd/govard/main.go
    binary: govard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X govard/internal/cmd.Version={{ .Version }} -X govard/internal/desktop.Version={{ .Version }}

  - id: govard-desktop
    main: ./cmd/govard-desktop/main.go
    binary: govard-desktop
    tags:
      - desktop
      - production
      - webkit2_41
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X govard/internal/cmd.Version={{ .Version }} -X govard/internal/desktop.Version={{ .Version }}

archives:
  - id: govard-archive
    ids:
      - govard
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{- title .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: govard-desktop-archive
    ids:
      - govard-desktop
    name_template: >-
      govard-desktop_{{ .Version }}_{{- title .Os }}_{{ .Arch }}
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

nfpms:
  - id: govard-installer
    package_name: govard
    ids:
      - govard
      - govard-desktop
    formats:
      - deb
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    bindir: /usr/local/bin
    maintainer: DDTCoreX <kaido4492@gmail.com>
    vendor: DDTCoreX
    homepage: https://github.com/ddtcorex/govard
    description: Govard local development orchestrator with CLI and Desktop modes
    license: MIT
    section: utils
    priority: optional
    dependencies:
      - ca-certificates
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libnss3-tools
    contents:
      - src: ./packaging/linux/govard.desktop
        dst: /usr/share/applications/govard.desktop
      - src: ./packaging/icons/govard.svg
        dst: /usr/share/icons/hicolor/scalable/apps/govard.svg
      - src: ./packaging/icons/govard.svg
        dst: /usr/share/icons/hicolor/16x16/apps/govard.svg
      - src: ./packaging/icons/govard.svg
        dst: /usr/share/icons/hicolor/32x32/apps/govard.svg
      - src: ./packaging/icons/govard.svg
        dst: /usr/share/icons/hicolor/48x48/apps/govard.svg
      - src: ./packaging/icons/govard.svg
        dst: /usr/share/icons/hicolor/128x128/apps/govard.svg
      - src: ./packaging/icons/govard.svg
        dst: /usr/share/icons/hicolor/256x256/apps/govard.svg

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "Merge branch"
      - "Merge pull request"
  groups:
    - title: ✨ New Features
      regexp: "^feat[(\\w)]*!?: "
      order: 0
    - title: 🛠 Improvements
      regexp: "^perf[(\\w)]*!?: "
      order: 1
    - title: 🐛 Bug Fixes
      regexp: "^fix[(\\w)]*!?: "
      order: 2
    - title: 📚 Documentation
      regexp: "^docs[(\\w)]*!?: "
      order: 3
    - title: 📦 Others
      order: 99
  format: "- {{ .Message }}"

release:
  footer: |
    Automated release by GoReleaser.
