{{ $cache := .Config.Stack.Services.Cache }}
{{ $cacheVersion := .Config.Stack.CacheVersion }}
{{ if or (eq $cache "redis") (eq $cache "valkey") }}
services:
  redis:
    image: {{ if eq $cache "valkey" }}valkey/valkey:{{ $cacheVersion }}{{ else }}redis:{{ $cacheVersion }}-alpine{{ end }}
    networks:
      - govard-net
{{ end }}
