name: Bug Report
description: Report a reproducible Govard bug.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search existing issues.

        For security-related reports, use private reporting:
        https://github.com/ddtcorex/govard/security/advisories

  - type: input
    id: govard-version
    attributes:
      label: Govard version
      description: Output of `govard version`
      placeholder: v1.0.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Docker version, Go version
      render: bash
      placeholder: |
        uname -a
        docker --version
        go version
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `govard init`
        2. Run `govard env up`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
