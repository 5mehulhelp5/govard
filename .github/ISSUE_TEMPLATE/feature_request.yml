name: Feature Request
description: Suggest an improvement to Govard.
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List alternatives or workarounds you tried.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples from similar tools.
